name: Bug
description: Something broken or behaving incorrectly
title: "[Bug] "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Use this template like a Jira/Asana ticket. Keep **Implementation** abstract — save file-level detail for the PR.

  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What is wrong, where it appears, and impact (one paragraph).
      placeholder: |
        OpenRouter chat fails with "Provider returned error" when …
    validations:
      required: true

  - type: textarea
    id: scope
    attributes:
      label: Scope
      description: What must be fixed or investigated as part of this ticket.
      placeholder: |
        - OpenRouter error handling and user-facing messages
        - Global AI model guidance in admin
        - …
    validations:
      required: true

  - type: textarea
    id: out_of_scope
    attributes:
      label: Out of scope
      description: Related issues that are not fixed in this ticket.
      placeholder: |
        - Billing / credits on OpenRouter
        - …
    validations:
      required: true

  - type: textarea
    id: implementation
    attributes:
      label: Implementation (abstract)
      description: Intended fix approach at a high level — no file paths (PR level detail only).
      placeholder: |
        - Parse provider metadata for clearer errors
        - Route only to endpoints that support tools
        - …
    validations:
      required: true

  - type: textarea
    id: acceptance_criteria
    attributes:
      label: Acceptance criteria
      description: Testable conditions that must be true for this bug to be considered fixed.
      value: |
        - [ ] …
        - [ ] …
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      description: Optional but helpful for bugs.
      placeholder: |
        1. …
        2. …
