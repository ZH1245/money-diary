<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#2563eb" />
    <title>Money Diary — Offline</title>
    <style>
      :root {
        color-scheme: light dark;
        font-family: Poppins, system-ui, sans-serif;
        background: #f8fafc;
        color: #0f172a;
      }

      @media (prefers-color-scheme: dark) {
        :root {
          background: #020617;
          color: #e2e8f0;
        }
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 1.5rem;
      }

      main {
        max-width: 24rem;
        text-align: center;
      }

      h1 {
        margin: 0 0 0.75rem;
        font-size: 1.25rem;
      }

      p {
        margin: 0 0 1.25rem;
        line-height: 1.5;
        opacity: 0.8;
      }

      button {
        border: 0;
        border-radius: 0.625rem;
        background: #2563eb;
        color: #fff;
        font: inherit;
        font-weight: 600;
        padding: 0.65rem 1rem;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>You are offline</h1>
      <p>Money Diary needs a connection to load your latest balances and transactions.</p>
      <button type="button" onclick="window.location.reload()">Try again</button>
    </main>
  </body>
</html>
